<title>あそびのにわ</title>
<style>
:root{
  --spd:1; --glow:.6;
  --cream:#FFF4DC; --mint:#CFEBD9; --coral:#FF8A70; --wood:#C98F4E; --ink:#2C5D55;
  --mound1:#B98A52; --mound2:#8AC47E;
  --shadow:0 10px 0 rgba(70,110,95,.16),0 18px 34px rgba(50,90,75,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--cream);
  font-family:"Hiragino Maru Gothic ProN","Zen Maru Gothic",system-ui,sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none}
button{font:inherit;border:0;background:none;cursor:pointer;touch-action:manipulation;color:inherit;padding:0}

.screen{position:fixed;inset:0;display:none;overflow:hidden}
.screen.on{display:flex}
.center{align-items:center;justify-content:center;flex-direction:column;
  gap:clamp(18px,4vh,42px);padding:max(20px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom))}

.round{width:clamp(84px,10vw,110px);height:clamp(84px,10vw,110px);border-radius:50%;
  display:grid;place-items:center;font-size:clamp(40px,5vw,56px);
  background:rgba(255,255,255,.94);box-shadow:0 6px 0 rgba(70,110,95,.18),0 10px 20px rgba(50,90,75,.15);
  transition:transform .12s}
.round:active{transform:scale(.9)}
.topbar{position:absolute;z-index:30;top:max(14px,env(safe-area-inset-top));left:16px;right:16px;
  display:flex;justify-content:space-between;pointer-events:none}
.topbar>*{pointer-events:auto}

/* ===== ambient blobs (home / select) ===== */
.amb{position:absolute;border-radius:50%;pointer-events:none;
  opacity:calc(.25 * var(--glow) + .08);filter:blur(2px);
  animation:ambFloat calc(9s/var(--spd)) ease-in-out infinite alternate}
@keyframes ambFloat{to{transform:translateY(-7vh) translateX(3vw) scale(1.15)}}

/* ===== titles & labels ===== */
.appTitle{z-index:2;display:flex;align-items:center;gap:clamp(10px,2vw,24px);
  font-size:clamp(44px,7.5vw,92px);font-weight:800;color:#3E8A77;letter-spacing:.05em;
  text-shadow:0 3px 0 #fff,0 10px 16px rgba(70,110,95,.22)}
.appTitle .tch{display:inline-block;animation:tbounce 2.6s ease-in-out infinite}
@keyframes tbounce{50%{transform:translateY(calc(-9px * var(--glow) - 2px)) rotate(2deg)}}
.appTitle .deco{font-size:.8em;filter:drop-shadow(0 4px 3px rgba(40,70,60,.25))}
.screenTitle{z-index:2;font-size:clamp(28px,4.4vw,50px);font-weight:800;color:#3E8A77;
  letter-spacing:.05em;text-shadow:0 3px 0 #fff,0 8px 12px rgba(70,110,95,.18)}
.cardName{position:absolute;left:0;right:0;bottom:clamp(8px,1.4vw,16px);z-index:3;
  text-align:center;font-weight:800;font-size:clamp(19px,2.6vw,30px);color:#456B5B;
  text-shadow:0 2px 0 rgba(255,255,255,.9),0 -1px 0 rgba(255,255,255,.9);pointer-events:none}

/* ===== home ===== */
#home{background:linear-gradient(170deg,#FFF3D6 0%,#DFF3E3 60%,#CBEDDC 100%)}
#home .sunbg{position:absolute;top:-20vmin;left:50%;transform:translateX(-50%);
  width:76vmin;height:76vmin;border-radius:50%;
  background:radial-gradient(circle,rgba(255,214,107,calc(.5*var(--glow)+.15)),rgba(255,214,107,0) 70%)}
.cardRow{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(16px,3vw,38px);z-index:2}
.bigCardBtn{position:relative;border-radius:34px;overflow:hidden;background:#fff;
  box-shadow:var(--shadow);transition:transform .15s}
.bigCardBtn:active{transform:scale(.94)}
.bigCardBtn svg.bg{position:absolute;inset:0;width:100%;height:100%}
.bigCardBtn .face{position:absolute;inset:0;display:grid;place-items:center;
  filter:drop-shadow(0 6px 4px rgba(40,70,60,.25));animation:bob 3.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(calc(-12px * var(--glow) - 3px))}}
.themeCard{width:clamp(176px,23vw,272px);height:clamp(208px,27vw,322px)}
.themeCard .face{font-size:clamp(74px,11vw,128px);padding-bottom:14%}
.cardRow>*:nth-child(2) .face{animation-delay:.5s}
.cardRow>*:nth-child(3) .face{animation-delay:1s}

/* ===== game select ===== */
#games{background:linear-gradient(170deg,#FFF3D6,#D5EFF7)}
.gameCard{width:clamp(168px,22vw,270px);height:clamp(168px,22vw,270px)}
.gameCard .face{font-size:clamp(70px,10vw,120px);padding-bottom:16%}

/* ===== play ===== */
#play{background:#BEE7F5}
#scene{position:absolute;inset:0}
#scene svg{width:100%;height:100%;display:block}
#stage{position:absolute;inset:0;z-index:5;overflow:hidden}
.item{position:absolute;left:0;top:0;width:var(--sz,120px);height:var(--sz,120px);
  display:grid;place-items:center;font-size:calc(var(--sz,120px)*.72);
  filter:drop-shadow(0 8px 6px rgba(30,70,90,.22));will-change:transform}
.item .hit{position:absolute;inset:-24%;border-radius:50%}
.pop{position:absolute;left:0;top:0;z-index:12;pointer-events:none;font-size:34px;will-change:transform,opacity}
/* 風船+ぶらさがりキャラ */
.item.bItem{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  height:calc(var(--sz,120px)*1.5);gap:0}
.bItem .bal{font-size:calc(var(--sz,120px)*.68);line-height:1}
.bItem .bstr{width:3px;height:calc(var(--sz,120px)*.14);background:#9A7B4F;border-radius:2px}
.bItem .bchr2{font-size:calc(var(--sz,120px)*.48);line-height:1}
/* シャボン玉の中のキャラ */
.bwrap{position:relative;display:grid;place-items:center}
.bwrap .bchr{font-size:calc(var(--sz,120px)*.46);line-height:1}
.bwrap .bbl{position:absolute;font-size:calc(var(--sz,120px)*.95);opacity:.85;line-height:1}
#basket{position:absolute;z-index:8;bottom:2vh;width:clamp(150px,20vw,230px);
  pointer-events:none;filter:drop-shadow(0 10px 8px rgba(40,70,60,.3));will-change:transform}
#stars{position:absolute;z-index:25;top:max(20px,env(safe-area-inset-top));left:50%;
  transform:translateX(-50%);display:flex;flex-wrap:wrap;justify-content:center;
  gap:2px clamp(3px,.6vw,8px);
  padding:8px 16px;border-radius:26px;background:rgba(255,255,255,.55);
  backdrop-filter:blur(3px);filter:drop-shadow(0 3px 3px rgba(40,70,60,.2));
  pointer-events:none}
.star{filter:grayscale(1);opacity:.3;transition:all .35s cubic-bezier(.3,1.6,.5,1)}
.star.onn{filter:none;opacity:1;transform:scale(1.18)}
#bigGift{position:absolute;z-index:40;left:50%;top:42%;font-size:clamp(120px,22vw,220px);
  display:none;filter:drop-shadow(0 16px 14px rgba(120,70,20,.35));will-change:transform}
#bigGift.show{display:block;animation:giftDrop calc(.9s/var(--spd)) cubic-bezier(.3,1.5,.4,1) both,
  giftPulse 1.7s calc(1s/var(--spd)) ease-in-out infinite}
@keyframes giftDrop{from{transform:translate(-50%,-90vh) rotate(-24deg)}to{transform:translate(-50%,-50%)}}
@keyframes giftPulse{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-50%) scale(calc(1 + .12*var(--glow)))}}

/* ---- race game ---- */
#car{position:absolute;z-index:8;bottom:7vh;width:clamp(140px,18vw,225px);pointer-events:none;transform-origin:50% 92%;
  filter:drop-shadow(0 5px 5px rgba(30,60,80,.4));will-change:transform,left}
#car svg{width:100%;height:auto;display:block}
.roadLine{position:absolute;top:0;bottom:0;width:9px;transform:translateX(-50%);z-index:4;opacity:.95;
  background:repeating-linear-gradient(180deg,#FFF6DE 0 46px,transparent 46px 112px);
  animation:roadMove calc(.5s/var(--spd)) linear infinite}
@keyframes roadMove{to{background-position:0 112px}}

/* ---- match game ---- */
.mboard{position:absolute;transform:translate(-50%,-50%);z-index:5;pointer-events:none;
  filter:drop-shadow(0 14px 18px rgba(60,35,10,.35))}
.mboard svg{width:100%;height:100%;display:block}
.slot{position:absolute;width:var(--ss,140px);height:var(--ss,140px);transform:translate(-50%,-50%);z-index:6;pointer-events:none}
.slot svg{width:100%;height:100%}
.piece{position:absolute;width:var(--ss,140px);height:var(--ss,140px);transform:translate(-50%,-50%);
  z-index:8;background:none;touch-action:none;
  transition:left calc(.35s/var(--spd)) cubic-bezier(.3,1.3,.5,1),top calc(.35s/var(--spd)) cubic-bezier(.3,1.3,.5,1);
  filter:drop-shadow(0 8px 6px rgba(30,70,90,.25))}
.piece.drag{transition:none;z-index:22;filter:drop-shadow(0 18px 14px rgba(30,70,90,.32))}
.piece.placed{pointer-events:none}
.piece svg{width:100%;height:100%;pointer-events:none}

/* ---- mole holes ---- */
.hole{position:absolute;width:clamp(120px,15vw,190px);transform:translate(-50%,-50%);z-index:6}
.hole svg{display:block;width:100%;overflow:visible}
.hole .back{position:relative;z-index:1}
.hole .cwrap{position:absolute;left:-6%;right:-6%;bottom:30%;height:230%;
  overflow:hidden;display:flex;align-items:flex-end;justify-content:center;z-index:2}
.hole .char{font-size:clamp(70px,9.5vw,112px);line-height:1;padding:14px 22px;
  filter:drop-shadow(0 6px 5px rgba(40,70,60,.3));
  transform:translateY(115%);transition:transform calc(.3s/var(--spd)) cubic-bezier(.3,1.5,.5,1)}
.hole.up .char{transform:translateY(-2%)}
.hole.happy .char{animation:happyJump calc(.5s/var(--spd)) ease-out}
@keyframes happyJump{30%{transform:translateY(-30%) scale(1.15)}100%{transform:translateY(115%)}}
.hole .mound{position:absolute;left:0;right:0;bottom:0;z-index:3;pointer-events:none}

/* ===== reward / gacha ===== */
#reward{background:linear-gradient(170deg,#FFEFD0,#FBD9D2)}
#machineWrap{position:relative;width:clamp(310px,44vw,500px)}
#machineWrap svg.machine{width:100%;height:auto;display:block;filter:drop-shadow(0 16px 22px rgba(120,60,40,.25))}
#machineBtn{position:absolute;inset:0;z-index:2}
#machineBtn:active{transform:scale(.97)}
#knob{transform-box:fill-box;transform-origin:center}
#knob.turn{animation:knobSpin calc(.95s/var(--spd)) cubic-bezier(.5,.05,.3,1)}
@keyframes knobSpin{to{transform:rotate(360deg)}}
#capsule{position:absolute;left:50%;bottom:5%;width:31%;z-index:5;background:none;
  transform:translateX(-50%) scale(0)}
#capsule svg{display:block;width:100%;overflow:visible}
#capsule svg g{transform-box:fill-box;transform-origin:center;transition:transform calc(.4s/var(--spd)),opacity calc(.4s/var(--spd))}
#capsule.drop{animation:capDrop calc(.75s/var(--spd)) cubic-bezier(.34,1.55,.5,1) both}
@keyframes capDrop{0%{transform:translateX(-50%) translateY(-320%) scale(.55)}
  62%{transform:translateX(-50%) translateY(10%) scale(1.12,.82)}
  82%{transform:translateX(-50%) translateY(-6%) scale(.94,1.08)}
  100%{transform:translateX(-50%) scale(1)}}
#capsule.wob{animation:wob .55s ease-in-out infinite}
@keyframes wob{0%,100%{transform:translateX(-50%)}25%{transform:translateX(-50%) rotate(-10deg)}75%{transform:translateX(-50%) rotate(10deg)}}
#capsule.zoom{animation:none;z-index:9;
  transform:translateX(-50%) translateY(-125%) scale(2.4);
  transition:transform calc(.55s/var(--spd)) cubic-bezier(.3,1.25,.4,1)}
#capsule.open{animation:none}
#capsule.open .capTop{transform:translate(-16px,-60px) rotate(-32deg);opacity:0}
#capsule.open .capBottom{transform:translate(16px,36px) rotate(26deg);opacity:0}
#hand{position:absolute;z-index:6;font-size:clamp(46px,7vw,74px);pointer-events:none;display:none;
  filter:drop-shadow(0 6px 5px rgba(40,40,40,.35));animation:handBob .85s ease-in-out infinite}
#hand.show{display:block}
@keyframes handBob{50%{transform:translateY(-16px)}}
#flyCoin{position:absolute;z-index:5;left:50%;top:-16vh;font-size:clamp(60px,9vw,90px);
  transform:translateX(-50%);filter:drop-shadow(0 8px 6px rgba(150,95,0,.3));display:none}
#flyCoin.go{display:block;animation:coinFly calc(1s/var(--spd)) cubic-bezier(.4,0,.6,1.2) forwards}
@keyframes coinFly{to{top:34%;transform:translateX(-50%) rotate(360deg) scale(.55);opacity:0}}
#cardBox{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:4vh;background:radial-gradient(circle,rgba(255,252,240,.96),rgba(255,238,214,.98))}
#cardBox.on{display:flex}
#bigCard{width:clamp(220px,30vw,320px);aspect-ratio:3/4;border-radius:30px;border:12px solid #fff;
  display:grid;place-items:center;font-size:clamp(120px,18vw,190px);
  background:linear-gradient(150deg,#FFF6C9,#CDEFFB);
  box-shadow:0 0 0 6px rgba(255,201,77,.5),0 24px 50px rgba(120,80,30,.3);
  animation:reveal calc(.8s/var(--spd)) cubic-bezier(.2,1,.3,1.25) both}
@keyframes reveal{from{transform:rotateY(90deg) scale(.3);opacity:0}}
#againRow{display:flex;gap:5vw}

/* ===== book ===== */
#book{background:linear-gradient(170deg,#FFF3D6,#E7E9F6)}
#bookGrid{width:min(940px,92vw);max-height:70vh;overflow-y:auto;display:grid;
  grid-template-columns:repeat(4,1fr);gap:clamp(12px,2vw,22px);padding:10px;
  -webkit-overflow-scrolling:touch;touch-action:pan-y}
.bookCard{aspect-ratio:3/4;border-radius:22px;display:grid;place-items:center;
  font-size:clamp(50px,7vw,84px);background:#fff;box-shadow:var(--shadow)}
.bookCard.locked{background:rgba(255,255,255,.4);box-shadow:none}
.bookCard.locked span{filter:grayscale(1) brightness(2.6) contrast(.15)}

/* ===== hero ===== */
#heroHome{position:absolute;left:5%;bottom:8%;width:clamp(110px,15vw,190px);z-index:2;
  filter:drop-shadow(0 10px 8px rgba(40,70,60,.25));transform-origin:50% 88%;
  animation:heroTrick calc(4.8s/var(--spd)) ease-in-out infinite}
@keyframes heroTrick{
  0%{transform:translateY(0) rotate(0)}
  6%{transform:translateY(-12px) rotate(0)}
  11%{transform:translateY(0) scale(1.06,.93)}
  16%{transform:translateY(-12px) scale(1)}
  21%{transform:translateY(0) scale(1.06,.93)}
  26%{transform:translateY(0) scale(1)}
  38%{transform:translateY(-72px) rotate(200deg)}
  50%{transform:translateY(0) rotate(360deg)}
  54%{transform:translateY(0) rotate(360deg) scale(1.16,.82)}
  60%{transform:translateY(-6px) rotate(360deg) scale(.95,1.06)}
  65%{transform:translateY(0) rotate(360deg) scale(1)}
  74%{transform:rotate(354deg)}
  82%{transform:rotate(366deg)}
  90%,100%{transform:rotate(360deg)}}
#heroHome svg{width:100%;height:auto;display:block}
#heroFly{position:absolute;z-index:38;left:0;top:24%;width:clamp(170px,24vw,280px);
  display:none;pointer-events:none;filter:drop-shadow(0 10px 10px rgba(40,70,60,.3))}
#heroFly svg{width:100%;height:auto;display:block}
#heroFly.go{display:block;animation:heroDash calc(1.7s/var(--spd)) ease-in-out forwards}
@keyframes heroDash{
  0%{transform:translateX(-32vw) translateY(7vh) rotate(4deg)}
  50%{transform:translateX(38vw) translateY(-3vh) rotate(-4deg)}
  100%{transform:translateX(115vw) translateY(5vh) rotate(4deg)}}

/* ===== staff ===== */
#gearBtn{position:absolute;z-index:31;top:max(14px,env(safe-area-inset-top));right:16px;
  width:clamp(64px,7.5vw,88px);height:clamp(64px,7.5vw,88px);border-radius:50%;
  display:grid;place-items:center;font-size:clamp(30px,3.6vw,44px);
  background:rgba(255,255,255,.75);box-shadow:0 4px 0 rgba(70,110,95,.14);opacity:.85}
#gearBtn.holding{animation:gearSpin 2s linear}
@keyframes gearSpin{to{transform:rotate(360deg)}}

#staffHold{position:fixed;z-index:98;left:0;bottom:0;width:88px;height:88px;opacity:0}
#settings{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
  background:rgba(25,50,46,.72);padding:20px}
#settings.open{display:flex}
.panel{width:min(660px,94vw);max-height:92vh;overflow-y:auto;background:#fff;border-radius:28px;
  padding:30px;color:var(--ink);-webkit-overflow-scrolling:touch;touch-action:pan-y}
.panel h2{font-size:26px;margin-bottom:18px}
.setting{margin:18px 0}
.setting p{font-size:20px;font-weight:700;margin-bottom:10px}
.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.levels.three{grid-template-columns:repeat(3,1fr)}
.levels.two{grid-template-columns:repeat(2,1fr)}
.level{min-height:76px;border-radius:16px;background:#EAF2EF;font-size:19px;font-weight:700}
.level.active{background:#3E8A77;color:#fff}
.closeSettings{width:100%;min-height:80px;margin-top:18px;border-radius:16px;
  background:#24504B;color:#fff;font-size:22px}
@media (max-width:760px){
  #bookGrid{grid-template-columns:repeat(3,1fr)}
  .themeCard{width:146px;height:176px}
  .gameCard{width:146px;height:146px}
}
@media (prefers-reduced-motion:reduce){.face,.amb{animation:none}}
</style>
</head>

<section id="play" class="screen" aria-label="あそぶ">

  <div id="basket" hidden><svg viewBox="0 0 140 215">
    <defs>
      <linearGradient id="bkBody" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#D9A05B"/><stop offset="100%" stop-color="#A9743C"/>
      </linearGradient>

    <!-- マント -->

    <path d="M98 140 Q114 108 108 76" stroke="#F4694C" stroke-width="13" fill="none" stroke-linecap="round"/>

let AC=null;
const NOTES=[523.25,587.33,659.25,783.99,880,1046.5];
function ensureAC(){try{AC||=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume()}catch(e){}}
function tone(freq,{delay=0,dur=.3,type='triangle',v=1,to=null}={}){
  const vol=VOL[saved.settings.sound]*v; if(!vol||!AC)return;
  const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(to)o.frequency.exponentialRampToValueAtTime(to,t+dur*.85);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.015);
  g.gain.exponentialRampToValueAtTime(.0008,t+dur);
  o.connect(g).connect(AC.destination);o.start(t);o.stop(t+dur+.05);
}
/* エンジン「ブーン」：ローパスを通したのこぎり波 */
function vroom(pitch=1){
  const vol=VOL[saved.settings.sound]; if(!vol||!AC)return;
  const t=AC.currentTime;
  const o=AC.createOscillator(),o2=AC.createOscillator(),f=AC.createBiquadFilter(),g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(62*pitch,t);o.frequency.exponentialRampToValueAtTime(150*pitch,t+.32);
  o2.type='square';o2.frequency.setValueAtTime(124*pitch,t);o2.frequency.exponentialRampToValueAtTime(300*pitch,t+.32);
  f.type='lowpass';f.frequency.setValueAtTime(320,t);f.frequency.linearRampToValueAtTime(760,t+.3);f.Q.value=2;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*1.15,t+.05);
  g.gain.exponentialRampToValueAtTime(.001,t+.55);
  o.connect(f);o2.connect(f);f.connect(g).connect(AC.destination);
  o.start(t);o2.start(t);o.stop(t+.6);o2.stop(t+.6);
}
function tapSound(){
  ensureAC();const i=score%NOTES.length;
  if(theme==='flower'){
    tone(NOTES[i]);tone(NOTES[i]*2,{dur:.22,type:'sine',v:.35});
  }else if(theme==='animal'){
    tone(320,{dur:.22,type:'sine',v:.9,to:640});
    tone(640,{delay:.12,dur:.18,type:'sine',v:.5,to:430});
  }else{
    vroom(.9+ (i%3)*.18);   // ブーン（回ごとに少しピッチ違い）
  }
}
function popSound(bubble){
  ensureAC();
  if(bubble)tone(950,{dur:.14,type:'sine',v:.8,to:380});
  else tapSound();
}
function peekSound(){ensureAC();tone(500,{dur:.12,type:'sine',v:.6,to:760})}
function thunk(){ensureAC();tone(196,{dur:.16,type:'sine',v:.9});tone(147,{delay:.05,dur:.18,type:'sine',v:.7})}
function fanfare(){ensureAC();[0,2,4,5].forEach((n,k)=>tone(NOTES[n],{delay:k*.12,dur:.5}));tone(NOTES[5]*2,{delay:.5,dur:.7,type:'sine',v:.5})}
function bigFanfare(){ensureAC();[0,2,4,5,4,5].forEach((n,k)=>tone(NOTES[n],{delay:k*.13,dur:.45}));
  [0,4].forEach(n=>tone(NOTES[n]*2,{delay:.8,dur:.9,type:'sine',v:.4}))}
function ratchet(){ensureAC();for(let k=0;k<5;k++)tone(170+k*12,{delay:k*.09,dur:.05,type:'square',v:.5})}
function poyon(){ensureAC();tone(420,{dur:.18,type:'sine',v:.95,to:940});tone(940,{delay:.14,dur:.16,type:'sine',v:.5,to:620})}
function crack(){ensureAC();tone(1400,{dur:.08,type:'square',v:.4,to:900});tone(700,{delay:.05,dur:.12,type:'triangle',v:.6,to:1200})}
function whoosh(){ensureAC();tone(280,{dur:.42,type:'sine',v:.9,to:920});tone(560,{delay:.06,dur:.36,type:'triangle',v:.4,to:1400})}
function sparkleUp(){ensureAC();[3,4,5].forEach((n,k)=>tone(NOTES[n]*2,{delay:k*.07,dur:.2,type:'sine',v:.4}))}

/* ---------- BGM: 4曲構成(タイトル+ゲーム3種) ---------- */
const BGMVOL=[0,.02,.042];
const fq=n=>261.63*Math.pow(2,n/12);
/* bass: 数字=コード構成音(0=ルート,1=3度,2=5度を低音で), 'c'=和音スタブ, null=休符
   mel : 数字=構成音(1オクターブ上), 3=ルート2オクターブ上, null=休符 */
const TRACKS={
  title:{  /* やさしいワルツ(3拍子) */
    bpm:100,L:6,wave:'sine',stac:1.7,bdur:1.9,
    chords:[[0,4,7],[5,9,12],[0,4,7],[7,11,14]],
    bass:[0,null,'c',null,'c',null], mel:[2,null,0,null,1,null]},
  catch:{  /* ゆったり流れるドゥーワップ調 */
    bpm:120,L:8,wave:'triangle',stac:1.15,bdur:1.7,
    chords:[[0,4,7],[-3,0,4],[5,9,12],[7,11,14]],
    bass:[0,null,2,null,0,null,2,null], mel:[0,1,2,3,2,1,0,1]},
  balloon:{ /* 軽快なポルカ調 */
    bpm:138,L:8,wave:'triangle',stac:.62,bdur:.9,
    chords:[[0,4,7],[5,9,12],[7,11,14],[0,4,7]],
    bass:[0,'c',2,'c',0,'c',2,'c'], mel:[2,null,3,null,2,1,0,null]},
  mole:{   /* スピード感のある追いかけっこ調 */
    bpm:150,L:8,wave:'triangle',stac:.5,bdur:.45,
    chords:[[0,4,7],[5,9,12],[0,4,7],[7,11,14]],
    bass:[0,1,2,1,0,1,2,1], mel:[0,null,2,0,3,null,2,1]},
  match:{  /* ゆったり考えごと調(明るいボサノバ風) */
    bpm:112,L:8,wave:'sine',stac:1.25,bdur:1.8,
    chords:[[0,4,7],[-3,0,4],[5,9,12],[7,11,14]],
    bass:[0,null,2,null,0,null,2,null], mel:[2,null,1,0,3,null,1,null]},
  race:{   /* 疾走ドライビング調 */
    bpm:152,L:8,wave:'triangle',stac:.55,bdur:.5,
    chords:[[0,4,7],[5,9,12],[7,11,14],[5,9,12]],
    bass:[0,2,0,2,0,2,0,2], mel:[0,2,3,2,0,2,3,null]}
};
TRACKS.color=TRACKS.match;  /* いろわけはかたちはめと同じ曲 */
let bgm={on:false,t:null,step:0,g:null,trk:'title'};
function bgmNote(freq,dur,type,v,delay=0){
  if(!AC||!bgm.g)return;
  const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.012);
  g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g).connect(bgm.g);o.start(t);o.stop(t+dur+.05);
}
function bgmTick(){
  if(!bgm.on)return;
  const T=TRACKS[bgm.trk]||TRACKS.title;
  const st=60/T.bpm/2;
  const bar=Math.floor(bgm.step/T.L),s=bgm.step%T.L;
  const ch=T.chords[bar%T.chords.length];
  const b=T.bass[s];
  if(b==='c'){ch.forEach(n=>bgmNote(fq(n+12),st*.8,'sine',.28))}
  else if(b!==null&&b!==undefined){bgmNote(fq(ch[b]-12),st*T.bdur,'sine',1)}
  const m=T.mel[s];
  if(m!==null&&m!==undefined){
    const f=m===3?fq(ch[0]+24):fq(ch[m]+12);
    bgmNote(f,st*T.stac,T.wave,.85);
    if(bgm.trk==='balloon')bgmNote(f*2,st*T.stac,'sine',.22);  /* 高音キラキラ重ね */
  }
  if(bar%4===3&&s===T.L-1)[0,4,7,12].forEach((n,k)=>bgmNote(fq(n+24),st*.9,'sine',.4,k*st*.5));
  bgm.step++;
  bgm.t=setTimeout(bgmTick,st*1000);
}
function setTrack(name){if(bgm.trk===name)return;bgm.trk=name;bgm.step=0}
function startBGM(){
  ensureAC();if(!AC)return;
  if(!bgm.g){bgm.g=AC.createGain();bgm.g.connect(AC.destination)}
  bgm.g.gain.value=BGMVOL[saved.settings.bgm];
  if(bgm.on||BGMVOL[saved.settings.bgm]===0)return;
  bgm.on=true;bgm.step=0;bgmTick();
}
function stopBGM(){bgm.on=false;clearTimeout(bgm.t)}

/* ================= fx ================= */
function burst(x,y,icon,n=7,parent=stage){
  n=Math.max(3,Math.round(n*(.4+glow())));
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pop';p.textContent=icon;
    const a=Math.random()*Math.PI*2,d=60+Math.random()*90,s=.5+Math.random()*.8;
    p.style.transform=`translate(${x}px,${y}px) scale(.3)`;p.style.opacity=.4+glow()*.6;
    parent.append(p);
    requestAnimationFrame(()=>{
      p.style.transition=`transform ${.7/spd()}s cubic-bezier(.2,.7,.4,1), opacity ${.7/spd()}s`;
      p.style.transform=`translate(${x+Math.cos(a)*d}px,${y+Math.sin(a)*d-40}px) scale(${s}) rotate(${(Math.random()*120-60)}deg)`;
      p.style.opacity=0;
    });
    setTimeout(()=>p.remove(),900/spd());
  }
}

function makeBalloonEl(kind,chr,scale){

  el.style.setProperty('--sz',itemSize()*scale+'px');

function spawnBalloon(){
  if(!running)return;
  const gold=Math.random()<DIFF.gold[dif()];
  const kind=gold?'gold':(Math.random()>.42?'balloon':'bubble');
  const list=THEMES[theme].items;

function removeEnt(e){e.alive=false;e.el.remove();ents=ents.filter(x=>x!==e)}
function gotOne(n=1){

function catchIt(e,tapped){
  if(!e.alive||roundOver)return;
  burst(e.x,e.y,THEMES[theme].pop,6);

  removeEnt(e);gotOne();
  if(!roundOver)timers.push(setTimeout(spawnCatch,500/spd()));

function popIt(e){
  if(!e.alive||roundOver)return;
  const bubble=e.el.querySelector('.bbl')!==null;
  burst(e.x,e.y,e.gold?'🌟':(bubble?'💧':THEMES[theme].pop),e.gold?12:8);
  if(!e.gold&&e.chr)burst(e.x,e.y,e.chr,3);
  if(e.gold){sparkleUp()}else{popSound(bubble)}
  removeEnt(e);gotOne(e.gold?2:1);                   // 金の星は⭐2つぶん
  if(!roundOver)timers.push(setTimeout(spawnBalloon,380/spd()));
}

const HOLE_POS=[[18,42],[50,40],[82,42],[18,64],[50,66],[82,64],[18,86],[50,88],[82,86]];  // 3x3の9穴 [x%, y%]
function buildHoles(){

    const d=document.createElement('div');d.className='hole';

    stage.append(d);
    const hole={el:d,char:d.querySelector('.char'),busy:false,upNow:false,downTimer:null};

function layoutHoles(){
  holes.forEach((h,i)=>{const[x,y]=HOLE_POS[i];h.el.style.left=x+'%';h.el.style.top=y+'%'});
}
function moleUp(){
  if(!running||roundOver)return;
  const free=holes.filter(h=>!h.busy);
  const active=holes.filter(h=>h.upNow).length;
  if(free.length&&active<3){
    const h=free[Math.floor(Math.random()*free.length)];
    h.busy=true;h.upNow=true;
    const list=THEMES[theme].items;
    h.char.textContent=list[Math.floor(Math.random()*list.length)];
    h.el.classList.remove('happy');h.el.classList.add('up');peekSound();
    h.downTimer=setTimeout(()=>moleDown(h),(1500+Math.random()*700)*DIFF.dwellM[dif()]/spd());
  }
  timers.push(setTimeout(moleUp,(850+Math.random()*450)/spd()));
}
function moleDown(h){
  h.upNow=false;h.el.classList.remove('up');
  setTimeout(()=>h.busy=false,350/spd());
}
function whack(h){
  if(!h.upNow||roundOver)return;
  clearTimeout(h.downTimer);h.upNow=false;
  const r=h.char.getBoundingClientRect();
  burst(r.left+r.width/2,r.top+r.height/2,THEMES[theme].pop,7);
  tapSound();
  h.el.classList.remove('up');h.el.classList.add('happy');   // うれしそうにジャンプして帰る
  setTimeout(()=>{h.el.classList.remove('happy');h.busy=false},550/spd());
  gotOne();
}

  rstars=[];for(let i=0;i<5;i++)rstars.push(newStar(8+i*7));
  rnpc=[newNpc(14),newNpc(30)];
  car.style.left='50%';car.style.transform='translateX(-50%)';
}
function drawRace(dt){
  if(rcnv.width!==W||rcnv.height!==H){rcnv.width=W;rcnv.height=H}
  const v=(85+18*dif())*spd();
  camZ+=v*dt;
  const ptx=Math.max(-1.25,Math.min(1.25,(basketTX-W/2)/(W*.3)));
  playerX+=(ptx-playerX)*Math.min(1,dt*6);
  const ctx=rctx,horizon=H*.4,roadHalf=W*.36,cNow=curveFn(camZ);
  /* 空・太陽・山(カーブと逆に流れるパララックス) */
  ctx.fillStyle='#CFE9F8';ctx.fillRect(0,0,W,horizon+2);
  ctx.fillStyle='#FFF3C4';ctx.beginPath();ctx.arc(W*.72-cNow*26,horizon*.42,H*.055,0,7);ctx.fill();
  ctx.fillStyle='#B5DFA0';
  ctx.beginPath();ctx.ellipse(W*.2-cNow*60,horizon+2,W*.42,H*.095,0,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.ellipse(W*.8-cNow*60,horizon+2,W*.44,H*.12,0,Math.PI,0);ctx.fill();
  /* 道路(下→地平線へスキャンライン描画) */
  const rows=[];let dx=0,xoff=0;
  const K=W*0.0000016;
  const rowH=(H-horizon)/RROWS+1.5;
  for(let i=0;i<RROWS;i++){
    const t=1-(i/RROWS)*(1-MINT);
    const y=horizon+(H-horizon)*t;
    const rel=1/t,zW=camZ+rel*ZSC;
    dx+=curveFn(zW)*K;xoff+=dx;
    const center=W/2+xoff;
    const half=roadHalf*t+3;
    const band=Math.floor(zW/(ZSC*.9))%2;
    ctx.fillStyle=band?'#9CCF8B':'#8AC47E';ctx.fillRect(0,y,W,rowH);
    ctx.fillStyle=band?'#E85E4A':'#FFF6DE';ctx.fillRect(center-half,y,half*2,rowH);
    const ih=half*.9;
    ctx.fillStyle=band?'#8B98A8':'#84919F';ctx.fillRect(center-ih,y,ih*2,rowH);
    if(band){ctx.fillStyle='#FFF6DE';
      ctx.fillRect(center-ih*.34-3*t,y,6*t,rowH);
      ctx.fillRect(center+ih*.34-3*t,y,6*t,rowH);}
    rows[i]={y,center,half:ih,t};
  }
  /* 車の位置(高さは画面下から7vh) */
  const carY=H-H*.07-car.offsetHeight*.5;
  const tCar=Math.min(1,Math.max(MINT,(carY-horizon)/(H-horizon)));
  const iCar=Math.min(RROWS-1,Math.max(0,Math.round(((1-tCar)/(1-MINT))*RROWS)));
  const carRow=rows[iCar];
  const carX=carRow.center+playerX*carRow.half*.6;
  /* 遅い車(追い抜き)。設定でON/OFF */
  if(saved.settings.npc){
    const wBase=Math.max(140,Math.min(225,W*.18));
    for(const nc of rnpc){
      nc.rel-=v*(1-nc.sp)*dt/ZSC;
      if(!nc.passed&&nc.rel<=1/tCar){
        nc.passed=true;passHorn();
        const sx=carRow.center+nc.lane*carRow.half*.55;
        burst(sx,carY,'💨',5);
      }
      if(nc.rel<=.7){
        nc.rel=22+Math.random()*18;nc.lane=[-1,0,1][Math.floor(Math.random()*3)];
        nc.c=NPC_COLORS[Math.floor(Math.random()*NPC_COLORS.length)];
        nc.sp=.5+Math.random()*.15;nc.passed=false;
        continue;
      }
      const t=1/nc.rel;
      if(t<.075||t>1)continue;
      const i=Math.min(RROWS-1,Math.max(0,Math.round(((1-t)/(1-MINT))*RROWS)));
      const r=rows[i];
      drawNpc(rctx,r.center+nc.lane*r.half*.55,r.y,wBase*t,nc.c);
    }
  }
  /* 星(奥から迫ってくる・車の高さで判定) */
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const st of rstars){
    st.rel-=v*dt/ZSC;
    if(st.rel<=1/tCar+.02){
      const sx=carRow.center+st.lane*carRow.half*.55;
      if(!roundOver&&Math.abs(sx-carX)<car.offsetWidth*[.9,.72,.56][dif()]){
        burst(sx,carY,'✨',st.gold?12:7);
        ensureAC();vroom(1.05);tone(NOTES[score%6]*2,{dur:.2,type:'sine',v:.5});
        if(st.gold)sparkleUp();
        gotOne(st.gold?2:1);
      }
      st.rel=18+Math.random()*22;st.lane=[-1,0,1][Math.floor(Math.random()*3)];
      st.gold=Math.random()<DIFF.gold[dif()];
      continue;
    }
    const t=1/st.rel;
    if(t<.075)continue;  /* 遠すぎる星は描かない(地平線で重なるのを防止) */
    const i=Math.min(RROWS-1,Math.max(0,Math.round(((1-t)/(1-MINT))*RROWS)));
    const r=rows[i];
    const sx=r.center+st.lane*r.half*.55;
    ctx.font=`${Math.max(14,itemSize()*t*1.15)}px sans-serif`;
    ctx.fillText(st.gold?'🌟':'⭐',sx,r.y);
  }
  /* 車を道路の上に配置(路面に沿う+走行振動) */
  const bob=Math.sin(camZ*.55)*1.6+Math.sin(camZ*1.3)*.8;
  car.style.left=carX+'px';
  car.style.transform=`translateX(-50%) translateY(${bob}px) rotate(${(ptx-playerX)*14+cNow*1.6}deg)`;
}

/* ================= match (かたちはめ・木製パズル) ================= */
const SHAPES=['circle','square','triangle','star','heart'];
const SHAPE_COLORS=['#FF8A70','#FFD34D','#7FCE96','#8FB8EF','#C39AEC'];
let mslots=[],mSize=140,mUid=0;
function darker(hex,f){const n=parseInt(hex.slice(1),16);
  return `rgb(${Math.round(((n>>16)&255)*f)},${Math.round(((n>>8)&255)*f)},${Math.round((n&255)*f)})`}
function shapeEl(t,attrs){
  if(t==='circle')return `<circle cx="50" cy="47" r="37" ${attrs}/>`;
  if(t==='square')return `<rect x="15" y="12" width="70" height="70" rx="13" ${attrs}/>`;
  if(t==='triangle')return `<path d="M50 9 L89 81 L11 81 Z" stroke-linejoin="round" ${attrs}/>`;
  if(t==='star')return `<polygon points="50,7 60.5,37 92,37 67,56 76,88 50,68 24,88 33,56 8,37 39.5,37" stroke-linejoin="round" ${attrs}/>`;
  return `<path d="M50 85 C22 62 11 44 22 29 C31 17 46 21 50 32 C54 21 69 17 78 29 C89 44 78 62 50 85 Z" ${attrs}/>`;
}
function pieceSVG(t,color){
  const dk=darker(color,.6);
  return `<svg viewBox="0 0 100 100">
    ${shapeEl(t,`fill="${dk}" transform="translate(0,7)"`)}

}
function holeSVG(t){
  return `<svg viewBox="0 0 100 100">
    ${shapeEl(t,'fill="#3B2510"')}
    ${shapeEl(t,'fill="none" stroke="#241505" stroke-width="5" transform="translate(0,-1.5)" opacity=".9"')}
    ${shapeEl(t,'fill="none" stroke="#DFA968" stroke-width="3" transform="translate(0,2.5)" opacity=".55"')}
  </svg>`;
}
function woodSVG(w,h,light){
  const id='wd'+(++mUid);
  const c1=light?'#E4BA82':'#CE9857', c2=light?'#C08D51':'#A06B33';
  let grain='';
  for(let i=1;i<=3;i++){
    const y=h*i/4;
    grain+=`<path d="M${w*.05} ${y} Q${w*.3} ${y-8} ${w*.5} ${y} T${w*.95} ${y}" stroke="rgba(90,55,20,.25)" stroke-width="3" fill="none"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
    <rect width="${w}" height="${h}" rx="20" fill="url(#${id})"/>
    ${grain}
    <ellipse cx="${w*.82}" cy="${h*.3}" rx="9" ry="5" fill="rgba(90,55,20,.3)"/>
    <rect x="4" y="4" width="${w-8}" height="8" rx="4" fill="rgba(255,255,255,.3)"/>
    <rect x="4" y="${h-12}" width="${w-8}" height="8" rx="4" fill="rgba(0,0,0,.22)"/>
  </svg>`;
}
function addBoard(x,y,w,h,light){
  const d=document.createElement('div');d.className='mboard';
  d.style.left=x+'px';d.style.top=y+'px';d.style.width=w+'px';d.style.height=h+'px';
  d.innerHTML=woodSVG(Math.round(w),Math.round(h),light);
  stage.append(d);
}
function buildMatchRound(){
  if(roundOver||!running)return;
  stage.querySelectorAll('.slot,.piece,.mboard').forEach(e=>e.remove());
  const n=[3,5,5][dif()];
  mSize=Math.max(76,Math.min(168,W/(n+1.8),H*.2));
  const bw=Math.min(W*.94,n*mSize*1.28+mSize*.5), bh=mSize*1.6;
  const by=H*.32, ty=H*.77;
  addBoard(W/2,by,bw,bh,false);           /* 穴のあいた板 */
  addBoard(W/2,ty,bw,mSize*1.45,true);    /* ピース置き場のトレー */
  const types=SHAPES.slice().sort(()=>Math.random()-.5).slice(0,n);
  const colors=SHAPE_COLORS.slice().sort(()=>Math.random()-.5);
  const spacing=bw/n, x0=W/2-bw/2+spacing*.5;
  mslots=types.map((t,i)=>{
    const x=x0+spacing*i,y=by;
    const el=document.createElement('div');el.className='slot';
    el.style.setProperty('--ss',mSize+'px');
    el.innerHTML=holeSVG(t);
    el.style.left=x+'px';el.style.top=y+'px';stage.append(el);
    return{type:t,x,y,el,filled:false};
  });
  types.slice().sort(()=>Math.random()-.5).forEach((t,i)=>{
    const x=x0+spacing*i,y=ty;
    const el=document.createElement('button');el.className='piece';
    el.style.setProperty('--ss',mSize+'px');
    el.innerHTML=pieceSVG(t,colors[i%colors.length]);
    el.style.left=x+'px';el.style.top=y+'px';stage.append(el);
    attachDrag(el,t,x,y);
  });
}
function attachDrag(el,type,homeX,homeY){
  let dragging=false;
  el.addEventListener('pointerdown',ev=>{
    if(roundOver||el.classList.contains('placed'))return;
    dragging=true;el.classList.add('drag');
    try{el.setPointerCapture(ev.pointerId)}catch(e){}
    ev.stopPropagation();
  });
  el.addEventListener('pointermove',ev=>{
    if(!dragging)return;
    el.style.left=ev.clientX+'px';el.style.top=ev.clientY+'px';
  });
  const drop=()=>{
    if(!dragging)return;dragging=false;el.classList.remove('drag');
    const px=parseFloat(el.style.left),py=parseFloat(el.style.top);
    const th=mSize*[.85,.62,.5][dif()];
    const s=mslots.find(s=>!s.filled&&s.type===type&&Math.hypot(s.x-px,s.y-py)<th);
    if(s){
      s.filled=true;el.style.left=s.x+'px';el.style.top=s.y+'px';el.classList.add('placed');
      burst(s.x,s.y,THEMES[theme].pop,7);tapSound();thunk();
      gotOne();
      if(!roundOver&&mslots.every(x=>x.filled))timers.push(setTimeout(buildMatchRound,900/spd()));
    }else{
      el.style.left=homeX+'px';el.style.top=homeY+'px';  /* まちがいはそっと元の場所へ */
    }
  };
  el.addEventListener('pointerup',drop);el.addEventListener('pointercancel',drop);
}

/* ================= color (いろわけ) ================= */
const CGAME_COLORS=['#E8402A','#3D7FD9','#F5C518','#4CAF6D'];
let cslots=[],cRemaining=0;
function ballSVG(color){
  const id='bl'+(++mUid);
  return `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="${id}" cx="35%" cy="28%" r="80%">

}
function bucketSVG(color){
  const id='bk'+(++mUid);
  return `<svg viewBox="0 0 100 100">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${darker(color,.72)}"/>

function buildColorRound(){
  if(roundOver||!running)return;
  stage.querySelectorAll('.slot,.piece,.mboard').forEach(e=>e.remove());
  const n=[2,3,4][dif()];
  const bs=Math.max(90,Math.min(175,W/(n+1.6),H*.22));       /* バケツ */
  const ps=Math.max(64,Math.min(120,W/(2*n+2.2),H*.15));      /* ボール */
  const colors=CGAME_COLORS.slice().sort(()=>Math.random()-.5).slice(0,n);
  const bw=Math.min(W*.94,Math.max(n*bs*1.3,2*n*ps*1.15)+bs*.4);
  const by=H*.3, ty=H*.78;
  addBoard(W/2,by+bs*.18,bw,bs*1.55,false);
  addBoard(W/2,ty,bw,ps*1.5,true);
  const bsp=bw/n, bx0=W/2-bw/2+bsp*.5;
  cslots=colors.map((c,i)=>{
    const x=bx0+bsp*i,y=by;
    const el=document.createElement('div');el.className='slot';
    el.style.setProperty('--ss',bs+'px');
    el.innerHTML=bucketSVG(c);
    el.style.left=x+'px';el.style.top=y+'px';stage.append(el);
    return{color:c,x,y,cnt:0,cap:2,el};
  });
  const balls=colors.concat(colors).sort(()=>Math.random()-.5);  /* 各色2個 */
  cRemaining=balls.length;
  const psp=bw/balls.length, px0=W/2-bw/2+psp*.5;
  balls.forEach((c,i)=>{
    const x=px0+psp*i,y=ty;
    const el=document.createElement('button');el.className='piece';
    el.style.setProperty('--ss',ps+'px');
    el.innerHTML=ballSVG(c);
    el.style.left=x+'px';el.style.top=y+'px';stage.append(el);
    attachColorDrag(el,c,x,y,bs);
  });
}
function attachColorDrag(el,color,homeX,homeY,bs){
  let dragging=false;
  el.addEventListener('pointerdown',ev=>{
    if(roundOver||el.classList.contains('placed'))return;
    dragging=true;el.classList.add('drag');
    try{el.setPointerCapture(ev.pointerId)}catch(e){}
    ev.stopPropagation();
  });
  el.addEventListener('pointermove',ev=>{
    if(!dragging)return;
    el.style.left=ev.clientX+'px';el.style.top=ev.clientY+'px';
  });
  const drop=()=>{
    if(!dragging)return;dragging=false;el.classList.remove('drag');
    const px=parseFloat(el.style.left),py=parseFloat(el.style.top);
    const th=bs*[.95,.72,.55][dif()];
    const s=cslots.find(s=>s.color===color&&s.cnt<s.cap&&Math.hypot(s.x-px,s.y-py)<th);
    if(s){
      s.cnt++;
      el.classList.add('placed');
      el.style.left=(s.x+(s.cnt===1?-1:1)*bs*.13)+'px';
      el.style.top=(s.y-bs*.06)+'px';

      burst(s.x,s.y-bs*.2,'✨',7);poyon();tapSound();
      gotOne();cRemaining--;
      if(!roundOver&&cRemaining===0)timers.push(setTimeout(buildColorRound,900/spd()));
    }else{
      el.style.left=homeX+'px';el.style.top=homeY+'px';
    }
  };
  el.addEventListener('pointerup',drop);el.addEventListener('pointercancel',drop);
}

/* ================= main loop ================= */
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(.05,(t-lastT)/1000||0);lastT=t;
  if(!running)return;
  const s=spd();
  if(game==='catch'){
    basketX+=(basketTX-basketX)*Math.min(1,dt*10);
    const bw=basket.offsetWidth;
    basket.style.transform=`translateX(${basketX-bw/2}px)`;
    const topY=H-basket.offsetHeight-H*.02;
    for(const e of [...ents]){
      const csz=itemSize()*e.sc;
      e.y+=e.vy*s*dt;e.ph+=dt*2;
      const x=e.x+Math.sin(e.ph)*e.amp*.4;
      e.el.style.transform=`translate(${x-csz/2}px,${e.y-csz/2}px) rotate(${Math.sin(e.ph)*10}deg)`;
      if(e.y>topY&&e.y<topY+H*.12&&Math.abs(x-basketX)<bw*DIFF.catchW[dif()]){catchIt(e,false);continue}
      if(e.y>H+itemSize()){removeEnt(e);timers.push(setTimeout(spawnCatch,600/s))}
    }
  }else if(game==='race'){
    if(rcnv&&rcnv.isConnected)drawRace(dt);
  }else if(game==='balloon'){
    for(const e of ents){
      const sz=itemSize()*e.sc;
      e.y-=e.vy*s*dt;e.ph+=dt*1.8;
      const x=e.x+Math.sin(e.ph)*e.amp*.5;
      e.el.style.transform=`translate(${x-sz/2}px,${e.y-sz/2}px) rotate(${Math.sin(e.ph)*8}deg)`;
      if(e.y<-sz){e.y=H+sz;e.x=sz/2+Math.random()*(W-sz)}
    }
  }
}
requestAnimationFrame(loop);

function startPlay(){
  show('play');ensureAC();
  $('#scene').innerHTML=(game==='race')?'':SCENES[theme];
  score=0;renderStars();roundOver=false;running=true;
  basket.hidden=true;car.hidden=true;
  if(game==='race'){
    car.hidden=false;basketX=basketTX=W/2;
    setupRace();
  }else if(game==='catch'){
    basket.hidden=false;basketX=basketTX=W/2;
    for(let i=0;i<3;i++)timers.push(setTimeout(spawnCatch,i*700/spd()));
  }else if(game==='race'){
    if(rcnv&&rcnv.isConnected)drawRace(dt);
  }else if(game==='balloon'){
    for(let i=0;i<4;i++)timers.push(setTimeout(spawnBalloon,i*420/spd()));
  }else if(game==='mole'){
    buildHoles();timers.push(setTimeout(moleUp,500/spd()));
  }else if(game==='color'){
    buildColorRound();
  }else{
    buildMatchRound();
  }
}

  },600*m));
  timers.push(setTimeout(()=>{
    capsule.classList.add('wob');gachaPhase='capsule';placeHand('capsule');
    timers.push(setTimeout(()=>{if(gachaPhase==='capsule')openCapsule()},4200*m));
  },1450*m));
});
capsule.addEventListener('pointerdown',ev=>{ev.stopPropagation();if(gachaPhase==='capsule')openCapsule()});
function openCapsule(){
  gachaPhase='opened';hand.classList.remove('show');
  /* 1. カプセルが手前にわーんと拡大 */
  capsule.classList.remove('wob');capsule.classList.add('zoom');whoosh();
  timers.push(setTimeout(()=>{
    /* 2. 大きくなったところでパカッと開く */
    capsule.classList.add('open');crack();
    const r=capsule.getBoundingClientRect(),w=$('#machineWrap').getBoundingClientRect();
    burst(r.left-w.left+r.width/2,r.top-w.top+r.height/2,'🎊',12,$('#machineWrap'));
    timers.push(setTimeout(()=>{
      const item=CARDS[Math.floor(Math.random()*CARDS.length)];
      if(!saved.cards.includes(item))saved.cards.push(item);persist();
      $('#bigCard').textContent=item;$('#cardBox').classList.add('on');fanfare();
    },520/spd()));
  },600/spd()));
}
$('#againPlay').onclick=()=>startPlay();
$('#cardBookBtn').onclick=()=>{renderBook();show('book')};

/* ================= book ================= */
function renderBook(){
  const g=$('#bookGrid');g.innerHTML='';
  CARDS.forEach(item=>{
    const d=document.createElement('div');
    d.className='bookCard'+(saved.cards.includes(item)?'':' locked');
    d.innerHTML=`<span>${item}</span>`;g.append(d);
  });
}

/* ================= wiring ================= */
$$('.theme').forEach(b=>b.onclick=()=>{theme=b.dataset.theme;ensureAC();tapSound();show('games')});
$$('.game').forEach(b=>b.onclick=()=>{game=b.dataset.game;startPlay()});
$$('.homeBtn').forEach(b=>b.onclick=()=>show('home'));
$('#backGames').onclick=()=>show('games');
$('#openBook').onclick=$('#rewardBook').onclick=()=>{renderBook();show('book')};

$$('.levels').forEach(box=>{
  box.dataset.labels.split(',').forEach((label,i)=>{
    const b=document.createElement('button');b.className='level';b.textContent=label;
    b.onclick=()=>{saved.settings[box.dataset.key]=i;persist();applySettings();ensureAC();tone(NOTES[i%6])};
    box.append(b);
  });
});
/* ⚙️ボタン: タップで職員用設定 */
$('#gearBtn').addEventListener('pointerdown',()=>$('#settings').classList.add('open'));
let holdTimer;const holdBtn=$('#staffHold');
holdBtn.addEventListener('pointerdown',()=>holdTimer=setTimeout(()=>$('#settings').classList.add('open'),3000));
['pointerup','pointercancel','pointerleave'].forEach(x=>holdBtn.addEventListener(x,()=>clearTimeout(holdTimer)));
$('.closeSettings').onclick=()=>$('#settings').classList.remove('open');
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){running=false;stopBGM()}
  else{
    if($('#play').classList.contains('on')&&!roundOver)running=true;
    startBGM();
  }
});
/* タイトルの1文字ずつゆれ */
(()=>{const t=$('#titleTxt');if(!t)return;const s=t.textContent;t.textContent='';
  [...s].forEach((ch,i)=>{const sp=document.createElement('span');sp.className='tch';
    sp.textContent=ch;sp.style.animationDelay=(i*.14)+'s';t.append(sp)})})();
document.addEventListener('pointerdown',()=>startBGM());
applySettings();
})();
</script>
</body>
</html>
